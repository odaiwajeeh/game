<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شاشة الأسئلة</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a14;
      --bg-2: #10172a;
      --panel: rgba(12, 22, 44, 0.86);
      --panel-strong: rgba(8, 14, 30, 0.96);
      --tile: #111f3d;
      --tile-2: #172b55;
      --text: #f7fbff;
      --muted: #aab8d5;
      --line: rgba(130, 178, 255, 0.22);
      --accent: #26d9ff;
      --accent-2: #ffb22c;
      --accent-3: #ff4b6e;
      --good: #41f59d;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.38);
      --radius: 8px;
      --font: "Segoe UI", Tahoma, Arial, "Noto Sans Arabic", ui-sans-serif, system-ui, sans-serif;
    }

    body.light {
      color-scheme: light;
      --bg: #f5f8ff;
      --bg-2: #dce9ff;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --tile: #edf4ff;
      --tile-2: #ffffff;
      --text: #10172a;
      --muted: #53617c;
      --line: rgba(39, 90, 165, 0.22);
      --accent: #006dff;
      --accent-2: #f08c00;
      --accent-3: #d42148;
      --good: #087f4e;
      --shadow: 0 20px 60px rgba(23, 44, 86, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      direction: rtl;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 12% 8%, rgba(38, 217, 255, 0.18), transparent 32rem),
        radial-gradient(circle at 82% 5%, rgba(255, 178, 44, 0.18), transparent 28rem),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      overflow-x: hidden;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      padding: clamp(0.75rem, 2vw, 1.2rem);
      position: relative;
      isolation: isolate;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.42), transparent 75%);
    }

    .display-toolbar {
      position: fixed;
      top: 0.85rem;
      left: 0.85rem;
      z-index: 20;
      display: flex;
      gap: 0.45rem;
      opacity: 0.22;
      transition: opacity 180ms ease;
    }

    .display-toolbar:hover,
    .display-toolbar:focus-within {
      opacity: 1;
    }

    .btn {
      --btn: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.45rem;
      border: 1px solid color-mix(in srgb, var(--btn) 48%, var(--line));
      border-radius: 8px;
      padding: 0.54rem 0.72rem;
      color: var(--text);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--btn) 24%, transparent), transparent),
        rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 16px color-mix(in srgb, var(--btn) 18%, transparent);
      font-size: 0.78rem;
      font-weight: 1000;
      letter-spacing: 0;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .btn.primary {
      color: #031121;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 82%, white), var(--accent));
    }

    .btn.warm {
      --btn: var(--accent-2);
    }

    .btn.ghost {
      --btn: var(--muted);
    }

    .stage {
      height: calc(100vh - 2.4rem);
      min-height: 34rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(13rem, 20vw, 18rem);
      grid-template-rows: auto auto minmax(0, 1fr);
      grid-template-areas:
        "question scores"
        "strikes scores"
        "answers scores";
      gap: clamp(0.75rem, 1.6vw, 1rem);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: clamp(1rem, 2.2vw, 1.45rem);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 22%),
        radial-gradient(circle at 50% -18%, rgba(38, 217, 255, 0.22), transparent 30rem),
        linear-gradient(160deg, var(--panel), var(--panel-strong));
      box-shadow: var(--shadow);
      position: relative;
      direction: ltr;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0.55rem;
      pointer-events: none;
      border: 2px solid color-mix(in srgb, var(--accent) 36%, transparent);
      border-radius: var(--radius);
      box-shadow: inset 0 0 26px rgba(38, 217, 255, 0.16);
    }

    .question-wrap {
      grid-area: question;
      position: relative;
      z-index: 1;
      display: grid;
      gap: 0.65rem;
      justify-items: center;
      text-align: center;
      direction: rtl;
      min-width: 0;
    }

    .brand {
      display: flex;
      gap: 0.65rem;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 900;
    }

    .brand-mark {
      width: 2.7rem;
      height: 2.7rem;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: #06101f;
      background: linear-gradient(135deg, #ffffff, var(--accent));
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 42%, transparent);
      font-weight: 1000;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.25rem;
      padding: 0.42rem 0.78rem;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(38, 217, 255, 0.08);
      font-size: 0.78rem;
      font-weight: 1000;
      letter-spacing: 0;
      text-transform: uppercase;
      box-shadow: 0 0 18px rgba(38, 217, 255, 0.12);
    }

    .pill.active-team {
      color: #06101f;
      border-color: color-mix(in srgb, var(--active-team, var(--accent)) 82%, white);
      background: linear-gradient(180deg, color-mix(in srgb, var(--active-team, var(--accent)) 82%, white), var(--active-team, var(--accent)));
      box-shadow: 0 0 28px color-mix(in srgb, var(--active-team, var(--accent)) 42%, transparent);
    }

    #timerPill {
      min-height: clamp(3.25rem, 6vw, 4.6rem);
      padding: 0.55rem clamp(1rem, 2vw, 1.45rem);
      color: var(--accent-2);
      border-color: color-mix(in srgb, var(--accent-2) 72%, white);
      background:
        radial-gradient(circle at 50% 0, rgba(255, 178, 44, 0.22), transparent 70%),
        rgba(255, 178, 44, 0.1);
      box-shadow: 0 0 34px rgba(255, 178, 44, 0.28);
      font-size: clamp(1.25rem, 3vw, 2.75rem);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .question-text {
      display: none;
    }

    .strike-display {
      grid-area: strikes;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 3.7rem;
      gap: clamp(0.5rem, 1.8vw, 1rem);
      direction: rtl;
    }

    .strike-mark {
      width: clamp(2.6rem, 5.2vw, 4.2rem);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 75, 110, 0.52);
      border-radius: var(--radius);
      color: #fff;
      background: radial-gradient(circle, rgba(255, 75, 110, 0.95), rgba(109, 0, 26, 0.92));
      box-shadow: 0 0 26px rgba(255, 75, 110, 0.56);
      font-size: clamp(2rem, 5vw, 3.7rem);
      line-height: 1;
      font-weight: 1000;
      opacity: 0;
      transform: scale(0.76) rotate(-7deg);
      transition: opacity 190ms ease, transform 190ms ease;
    }

    .strike-mark.active {
      opacity: 1;
      transform: scale(1) rotate(-7deg);
    }

    .stage.strike-flash {
      animation: red-flash 680ms ease;
    }

    .answer-board {
      grid-area: answers;
      position: relative;
      z-index: 1;
      display: grid;
      gap: clamp(0.65rem, 1.4vw, 0.9rem);
      align-content: center;
      direction: rtl;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    .answer-card {
      --answer-color: var(--accent);
      position: relative;
      display: grid;
      grid-template-columns: minmax(3rem, 4.2rem) minmax(0, 1fr) minmax(4rem, 6rem);
      align-items: stretch;
      min-height: clamp(4.2rem, 9vh, 5.8rem);
      overflow: hidden;
      color: var(--text);
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--answer-color) 26%, transparent), transparent 38%),
        linear-gradient(180deg, var(--tile-2), var(--tile));
      border: 1px solid color-mix(in srgb, var(--answer-color) 42%, var(--line));
      border-radius: var(--radius);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22), 0 0 16px color-mix(in srgb, var(--answer-color) 18%, transparent);
      isolation: isolate;
    }

    .answer-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(110deg, transparent 0 32%, rgba(255, 255, 255, 0.22) 45%, transparent 58%);
      transform: translateX(-110%);
      opacity: 0;
    }

    .answer-card.revealing::before {
      animation: sheen 700ms ease;
      opacity: 1;
    }

    .answer-rank,
    .answer-points {
      display: grid;
      place-items: center;
      padding: 0.5rem;
      font-size: clamp(1.45rem, 3.3vw, 2.8rem);
      font-weight: 1000;
      line-height: 1;
      background: rgba(0, 0, 0, 0.18);
    }

    .answer-main {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 0.7rem clamp(0.75rem, 2vw, 1.15rem);
      text-align: right;
    }

    .answer-text {
      width: 100%;
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: clamp(1.45rem, 3.2vw, 3rem);
      font-weight: 1000;
      line-height: 1;
      text-transform: uppercase;
    }

    .answer-card.hidden .answer-text,
    .answer-card.hidden .answer-points {
      color: transparent;
      text-shadow: none;
      position: relative;
    }

    .answer-card.hidden .answer-main::after {
      content: "??????";
      position: absolute;
      color: var(--muted);
      letter-spacing: 0;
      font-size: clamp(1.35rem, 3.2vw, 2.8rem);
      font-weight: 1000;
      opacity: 0.84;
    }

    .answer-card.hidden .answer-points::after {
      content: "--";
      position: absolute;
      color: var(--muted);
    }

    .score-grid {
      grid-area: scores;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      align-content: start;
      gap: 0.55rem;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      padding-left: clamp(0.7rem, 1.2vw, 1rem);
      border-left: 1px solid var(--line);
      direction: rtl;
    }

    .score-card {
      --team: var(--accent);
      display: grid;
      grid-template-columns: 0.55rem minmax(0, 1fr) auto;
      align-items: center;
      min-height: clamp(4rem, 11vh, 5.15rem);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--team) 48%, var(--line));
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--team) 22%, transparent), transparent 54%),
        var(--panel);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2), 0 0 16px color-mix(in srgb, var(--team) 18%, transparent);
    }

    .score-card.active {
      border-color: color-mix(in srgb, var(--team) 82%, white);
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--team) 34%, transparent), transparent 62%),
        var(--panel);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24), 0 0 30px color-mix(in srgb, var(--team) 38%, transparent);
    }

    .score-bar {
      height: 100%;
      background: var(--team);
      box-shadow: 0 0 18px var(--team);
    }

    .score-info {
      min-width: 0;
      padding: 0.65rem;
    }

    .score-name {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(0.9rem, 1.45vw, 1.08rem);
      font-weight: 1000;
      text-transform: uppercase;
    }

    .score-label {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .score-card.active .score-label {
      color: var(--team);
    }

    .score-value {
      padding: 0 0.95rem;
      font-size: clamp(1.75rem, 3.4vw, 2.7rem);
      font-weight: 1000;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 20px color-mix(in srgb, var(--team) 48%, transparent);
    }

    .empty {
      padding: 1rem;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      text-align: center;
      font-weight: 850;
    }

    .winner-overlay,
    .sound-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: rgba(4, 8, 18, 0.78);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 240ms ease, visibility 240ms ease;
    }

    .sound-overlay {
      z-index: 40;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }

    .sound-overlay.hidden,
    .winner-overlay.show {
      visibility: visible;
    }

    .sound-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .winner-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: min(42rem, 100%);
      padding: clamp(1rem, 4vw, 2.1rem);
      text-align: center;
      border: 1px solid color-mix(in srgb, var(--accent-2) 58%, transparent);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 0, rgba(255, 178, 44, 0.2), transparent 18rem),
        var(--panel-strong);
      box-shadow: var(--shadow), 0 0 34px rgba(255, 178, 44, 0.25);
    }

    .modal-card h2 {
      margin: 0;
      color: var(--accent-2);
      font-size: clamp(2rem, 7vw, 5.2rem);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(255, 178, 44, 0.46);
    }

    .modal-card p,
    .winner-name {
      margin: 0.85rem 0 1.1rem;
      color: var(--text);
      font-size: clamp(1.1rem, 3vw, 2rem);
      font-weight: 900;
    }

    .confetti-layer {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 34;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      top: -1.2rem;
      width: 0.72rem;
      height: 1rem;
      border-radius: 2px;
      background: var(--accent);
      animation: confetti-fall var(--fall-speed, 2200ms) linear forwards;
      opacity: 0.94;
    }

    @keyframes sheen {
      from { transform: translateX(-110%); }
      to { transform: translateX(110%); }
    }

    @keyframes red-flash {
      0%, 100% { box-shadow: var(--shadow); }
      22%, 60% { box-shadow: var(--shadow), 0 0 46px rgba(255, 75, 110, 0.68), inset 0 0 48px rgba(255, 75, 110, 0.22); }
    }

    @keyframes confetti-fall {
      0% { transform: translate3d(0, -1rem, 0) rotate(0deg); }
      100% { transform: translate3d(var(--drift, 0), 108vh, 0) rotate(var(--spin, 540deg)); }
    }

    @media (max-width: 900px) {
      .display-toolbar {
        opacity: 1;
      }

      .stage {
        height: auto;
        min-height: calc(100vh - 1.5rem);
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        grid-template-areas:
          "question"
          "strikes"
          "answers"
          "scores";
        direction: rtl;
      }

      .score-grid {
        grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
        padding-left: 0;
        border-left: 0;
      }

      .answer-card {
        grid-template-columns: 2.8rem minmax(0, 1fr) 4rem;
      }
    }
  </style>
</head>
<body>
  <div class="display-toolbar">
    <a class="btn ghost" href="players.html">اللاعبون</a>
    <button class="btn ghost" id="soundBtn" type="button">الصوت</button>
    <button class="btn primary" id="fullscreenBtn" type="button">ملء الشاشة</button>
  </div>

  <main class="app">
    <section class="stage" id="stage">
      <div class="question-wrap">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">G</div>
          <div>المسابقة الواحدة والخمسون بعد المليون</div>
        </div>
        <div class="pill-row">
          <span class="pill" id="roundPill">الجولة 1 من 1</span>
          <span class="pill" id="pointsPill">0 / 0 نقطة</span>
          <span class="pill" id="timerPill">المؤقت 00:30</span>
          <span class="pill active-team" id="activeTeamPill">الدور: -</span>
        </div>
        <h1 class="question-text" id="questionText">أضف سؤالا من لوحة التحكم</h1>
      </div>

      <div class="strike-display" id="strikeDisplay" aria-label="الأخطاء"></div>
      <div class="answer-board" id="answerBoard"></div>
      <section class="score-grid" id="scoreGrid" aria-label="لوحة النقاط"></section>
    </section>
  </main>

  <div class="sound-overlay" id="soundOverlay">
    <div class="modal-card">
      <h2>شاشة الأسئلة</h2>
      <p>اضغط لبدء العرض وتفعيل المؤثرات الصوتية.</p>
      <button class="btn primary" id="startDisplayBtn" type="button">تشغيل العرض</button>
    </div>
  </div>

  <div class="winner-overlay" id="winnerOverlay">
    <div class="modal-card">
      <h2>الفائز</h2>
      <div class="winner-name" id="winnerName">الفريق</div>
      <button class="btn ghost" id="winnerCloseBtn" type="button">إغلاق</button>
    </div>
  </div>

  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "classroom-feud-state-ar-v1";
      var CHANNEL_KEY = "classroom-feud-sync-ar-v1";
      var COLORS = ["#26d9ff", "#ffb22c", "#41f59d", "#ff4b6e", "#b882ff", "#58a6ff", "#ffd166", "#06d6a0"];
      var DEFAULT_STATE = {
        teams: [
          { id: makeId(), name: "الفريق الأزرق", score: 0, color: "#26d9ff" },
          { id: makeId(), name: "الفريق الذهبي", score: 0, color: "#ffb22c" }
        ],
        questions: [
          {
            id: makeId(),
            text: "اذكر شيئا يفعله الطلاب عندما يشعرون بالملل",
            answers: [
              { id: makeId(), text: "استخدام الهاتف", points: 30 },
              { id: makeId(), text: "التحدث مع الأصدقاء", points: 25 },
              { id: makeId(), text: "النوم", points: 15 }
            ]
          }
        ],
        currentQuestion: 0,
        revealed: {},
        strikes: 0,
        activeTeamId: null,
        theme: "dark",
        timer: { seconds: 30, remaining: 30, running: false, endsAt: null },
        celebration: { id: 0, name: "" },
        updatedAt: Date.now()
      };

      var state = loadState();
      var channel = "BroadcastChannel" in window ? new BroadcastChannel(CHANNEL_KEY) : null;
      var firebaseDb = window.classroomFeudDb || null;
      var firebaseRoomId = window.FIREBASE_ROOM_ID || "default-room";
      var gameRef = firebaseDb ? firebaseDb.ref("rooms/" + firebaseRoomId + "/gameState") : null;
      var audioContext = null;
      var seenRevealId = "";
      var seenStrikeId = "";
      var seenCelebrationId = 0;
      var initialRender = true;

      var els = {
        body: document.body,
        stage: document.getElementById("stage"),
        roundPill: document.getElementById("roundPill"),
        pointsPill: document.getElementById("pointsPill"),
        timerPill: document.getElementById("timerPill"),
        activeTeamPill: document.getElementById("activeTeamPill"),
        questionText: document.getElementById("questionText"),
        strikeDisplay: document.getElementById("strikeDisplay"),
        answerBoard: document.getElementById("answerBoard"),
        scoreGrid: document.getElementById("scoreGrid"),
        fullscreenBtn: document.getElementById("fullscreenBtn"),
        soundBtn: document.getElementById("soundBtn"),
        soundOverlay: document.getElementById("soundOverlay"),
        startDisplayBtn: document.getElementById("startDisplayBtn"),
        winnerOverlay: document.getElementById("winnerOverlay"),
        winnerName: document.getElementById("winnerName"),
        winnerCloseBtn: document.getElementById("winnerCloseBtn"),
        confettiLayer: document.getElementById("confettiLayer")
      };

      normalizeState();
      render();
      seenRevealId = state.lastRevealId || "";
      seenStrikeId = state.lastStrikeId || "";
      seenCelebrationId = state.celebration.id || 0;
      initialRender = false;
      bindEvents();
      bindFirebaseSync();
      setInterval(renderTimer, 250);
      setInterval(pollState, 700);

      function bindEvents() {
        els.startDisplayBtn.addEventListener("click", function () {
          unlockAudio();
          els.soundOverlay.classList.add("hidden");
          playSound("start");
        });
        els.soundBtn.addEventListener("click", function () {
          unlockAudio();
          els.soundOverlay.classList.add("hidden");
          playSound("click");
        });
        els.fullscreenBtn.addEventListener("click", toggleFullscreen);
        els.winnerCloseBtn.addEventListener("click", function () {
          els.winnerOverlay.classList.remove("show");
        });
        window.addEventListener("storage", function (event) {
          if (event.key === STORAGE_KEY && event.newValue) {
            applyIncomingState(JSON.parse(event.newValue));
          }
        });
        if (channel) {
          channel.addEventListener("message", function (event) {
            if (event.data && event.data.type === "state") {
              applyIncomingState(event.data.state);
            }
          });
        }
      }

      function bindFirebaseSync() {
        if (!gameRef) {
          return;
        }
        gameRef.on("value", function (snapshot) {
          var incoming = snapshot.val();
          if (!incoming) {
            return;
          }
          if ((incoming.updatedAt || 0) >= (state.updatedAt || 0)) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(incoming));
            applyIncomingState(incoming);
          }
        });
      }

      function pollState() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) {
            return;
          }
          var incoming = JSON.parse(saved);
          if ((incoming.updatedAt || 0) > (state.updatedAt || 0)) {
            applyIncomingState(incoming);
          }
        } catch (error) {
          return;
        }
      }

      function applyIncomingState(incoming) {
        state = clone(incoming);
        normalizeState();
        handleEvents();
        render();
      }

      function handleEvents() {
        if (!initialRender && state.lastRevealId && state.lastRevealId !== seenRevealId) {
          seenRevealId = state.lastRevealId;
          playSound("reveal");
          setTimeout(animateRevealedCards, 30);
        }
        if (!initialRender && state.lastStrikeId && state.lastStrikeId !== seenStrikeId) {
          seenStrikeId = state.lastStrikeId;
          playSound("strike");
          flashStrike();
        }
        if (!initialRender && state.celebration && state.celebration.id && state.celebration.id !== seenCelebrationId) {
          seenCelebrationId = state.celebration.id;
          showWinner(state.celebration.name);
        }
      }

      function render() {
        els.body.classList.toggle("light", state.theme === "light");
        renderQuestion();
        renderStrikes();
        renderAnswers();
        renderScores();
        renderTimer();
      }

      function renderQuestion() {
        var question = getCurrentQuestion();
        var totals = getQuestionTotals(question);
        var activeTeam = getActiveTeam();
        els.roundPill.textContent = state.questions.length ? "الجولة " + (state.currentQuestion + 1) + " من " + state.questions.length : "لا توجد جولات";
        els.questionText.textContent = question ? question.text : "أضف سؤالا من لوحة التحكم";
        els.pointsPill.textContent = totals.shown + " / " + totals.total + " نقطة";
        els.activeTeamPill.textContent = activeTeam ? "الدور: " + activeTeam.name : "الدور: -";
        els.activeTeamPill.style.setProperty("--active-team", activeTeam ? activeTeam.color : "var(--accent)");
      }

      function renderTimer() {
        var remaining = getTimerRemaining();
        els.timerPill.textContent = state.timer.running ? "المتبقي " + formatTime(remaining) : "المؤقت " + formatTime(remaining);
      }

      function renderStrikes() {
        els.strikeDisplay.innerHTML = "";
        for (var i = 0; i < 3; i += 1) {
          var mark = document.createElement("div");
          mark.className = "strike-mark" + (i < state.strikes ? " active" : "");
          mark.textContent = "×";
          els.strikeDisplay.appendChild(mark);
        }
      }

      function renderAnswers() {
        var question = getCurrentQuestion();
        els.answerBoard.innerHTML = "";
        if (!question || !question.answers.length) {
          els.answerBoard.appendChild(emptyNode("بانتظار الأسئلة من لوحة التحكم."));
          return;
        }
        var map = state.revealed[question.id] || {};
        question.answers.forEach(function (answer, index) {
          var card = document.createElement("div");
          card.className = "answer-card" + (map[answer.id] ? " revealed" : " hidden");
          card.style.setProperty("--answer-color", COLORS[index % COLORS.length]);

          var rank = document.createElement("div");
          rank.className = "answer-rank";
          rank.textContent = index + 1;

          var main = document.createElement("div");
          main.className = "answer-main";
          var text = document.createElement("div");
          text.className = "answer-text";
          text.textContent = answer.text || "بدون عنوان";
          main.appendChild(text);

          var points = document.createElement("div");
          points.className = "answer-points";
          points.textContent = answer.points;

          card.appendChild(rank);
          card.appendChild(main);
          card.appendChild(points);
          els.answerBoard.appendChild(card);
        });
      }

      function renderScores() {
        els.scoreGrid.innerHTML = "";
        var teams = sortedTeams();
        if (!teams.length) {
          els.scoreGrid.appendChild(emptyNode("لا توجد فرق بعد."));
          return;
        }
        teams.forEach(function (team) {
          var card = document.createElement("article");
          card.className = "score-card" + (team.id === state.activeTeamId ? " active" : "");
          card.style.setProperty("--team", team.color);
          var bar = document.createElement("div");
          bar.className = "score-bar";
          var info = document.createElement("div");
          info.className = "score-info";
          var name = document.createElement("h3");
          name.className = "score-name";
          name.textContent = team.name;
          var label = document.createElement("div");
          label.className = "score-label";
          label.textContent = team.id === state.activeTeamId ? "الدور الآن" : "النقاط";
          info.appendChild(name);
          info.appendChild(label);
          var score = document.createElement("div");
          score.className = "score-value";
          score.textContent = team.score;
          card.appendChild(bar);
          card.appendChild(info);
          card.appendChild(score);
          els.scoreGrid.appendChild(card);
        });
      }

      function animateRevealedCards() {
        Array.prototype.slice.call(els.answerBoard.querySelectorAll(".answer-card.revealed")).forEach(function (card) {
          card.classList.add("revealing");
          setTimeout(function () {
            card.classList.remove("revealing");
          }, 760);
        });
      }

      function flashStrike() {
        els.stage.classList.remove("strike-flash");
        void els.stage.offsetWidth;
        els.stage.classList.add("strike-flash");
      }

      function showWinner(name) {
        els.winnerName.textContent = name || "الفريق";
        els.winnerOverlay.classList.add("show");
        playSound("win");
        launchConfetti();
      }

      function toggleFullscreen() {
        unlockAudio();
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function () {});
        } else {
          document.exitFullscreen();
        }
      }

      function unlockAudio() {
        getAudioContext();
      }

      function getAudioContext() {
        if (!audioContext) {
          var AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) {
            return null;
          }
          audioContext = new AudioCtor();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume();
        }
        return audioContext;
      }

      function playSound(type) {
        var ctx = getAudioContext();
        if (!ctx) {
          return;
        }
        if (type === "reveal") {
          tone(ctx, 523.25, 0.08, 0, "triangle", 0.08);
          tone(ctx, 659.25, 0.1, 0.08, "triangle", 0.08);
          tone(ctx, 783.99, 0.16, 0.17, "sine", 0.1);
        } else if (type === "strike") {
          tone(ctx, 150, 0.18, 0, "sawtooth", 0.16);
          tone(ctx, 88, 0.28, 0.08, "square", 0.11);
        } else if (type === "win") {
          [392, 523.25, 659.25, 783.99, 1046.5].forEach(function (freq, index) {
            tone(ctx, freq, 0.18, index * 0.08, "triangle", 0.09);
          });
        } else if (type === "start") {
          tone(ctx, 440, 0.07, 0, "sine", 0.05);
          tone(ctx, 880, 0.12, 0.06, "sine", 0.06);
        } else {
          tone(ctx, 340, 0.045, 0, "sine", 0.025);
        }
      }

      function tone(ctx, frequency, duration, delay, type, volume) {
        var start = ctx.currentTime + delay;
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + duration + 0.03);
      }

      function launchConfetti() {
        els.confettiLayer.innerHTML = "";
        var colors = ["#26d9ff", "#ffb22c", "#41f59d", "#ff4b6e", "#ffffff", "#b882ff"];
        for (var i = 0; i < 90; i += 1) {
          var piece = document.createElement("div");
          piece.className = "confetti";
          piece.style.left = Math.random() * 100 + "vw";
          piece.style.background = colors[i % colors.length];
          piece.style.animationDelay = Math.random() * 520 + "ms";
          piece.style.setProperty("--fall-speed", 1700 + Math.random() * 1800 + "ms");
          piece.style.setProperty("--drift", -70 + Math.random() * 140 + "px");
          piece.style.setProperty("--spin", 320 + Math.random() * 760 + "deg");
          els.confettiLayer.appendChild(piece);
        }
        setTimeout(function () {
          els.confettiLayer.innerHTML = "";
        }, 4300);
      }

      function getCurrentQuestion() {
        return state.questions[state.currentQuestion] || null;
      }

      function getActiveTeam() {
        return state.teams.find(function (team) {
          return team.id === state.activeTeamId;
        }) || null;
      }

      function getQuestionTotals(question) {
        var totals = { shown: 0, total: 0 };
        if (!question) {
          return totals;
        }
        var map = state.revealed[question.id] || {};
        question.answers.forEach(function (answer) {
          totals.total += Number(answer.points) || 0;
          if (map[answer.id]) {
            totals.shown += Number(answer.points) || 0;
          }
        });
        return totals;
      }

      function getTimerRemaining() {
        if (state.timer.running && state.timer.endsAt) {
          return Math.max(0, Math.ceil((state.timer.endsAt - Date.now()) / 1000));
        }
        return clamp(Number(state.timer.remaining) || 0, 0, 599);
      }

      function sortedTeams() {
        return state.teams.slice().sort(function (a, b) {
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          return a.name.localeCompare(b.name, "ar");
        });
      }

      function normalizeState() {
        state.teams = Array.isArray(state.teams) ? state.teams : [];
        state.questions = Array.isArray(state.questions) ? state.questions : [];
        state.revealed = state.revealed || {};
        state.currentQuestion = clamp(Number(state.currentQuestion) || 0, 0, Math.max(0, state.questions.length - 1));
        state.strikes = clamp(Number(state.strikes) || 0, 0, 3);
        state.activeTeamId = state.activeTeamId || null;
        state.theme = state.theme === "light" ? "light" : "dark";
        state.timer = state.timer || { seconds: 30, remaining: 30, running: false, endsAt: null };
        state.timer.seconds = clamp(Number(state.timer.seconds) || 30, 5, 599);
        state.timer.remaining = clamp(Number(state.timer.remaining) || state.timer.seconds, 0, 599);
        state.timer.running = Boolean(state.timer.running);
        state.timer.endsAt = state.timer.endsAt || null;
        state.celebration = state.celebration || { id: 0, name: "" };
        state.teams.forEach(function (team, index) {
          team.id = team.id || makeId();
          team.name = String(team.name || "الفريق " + (index + 1));
          team.score = Number(team.score) || 0;
          team.color = team.color || COLORS[index % COLORS.length];
        });
        if (!state.teams.some(function (team) { return team.id === state.activeTeamId; })) {
          state.activeTeamId = state.teams[0] ? state.teams[0].id : null;
        }
        state.questions.forEach(function (question) {
          question.id = question.id || makeId();
          question.text = String(question.text || "سؤال بدون عنوان");
          question.answers = Array.isArray(question.answers) ? question.answers : [];
          question.answers.forEach(function (answer) {
            answer.id = answer.id || makeId();
            answer.text = String(answer.text || "");
            answer.points = Number(answer.points) || 0;
          });
          state.revealed[question.id] = state.revealed[question.id] || {};
        });
      }

      function loadState() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          return saved ? mergeState(clone(DEFAULT_STATE), JSON.parse(saved)) : clone(DEFAULT_STATE);
        } catch (error) {
          return clone(DEFAULT_STATE);
        }
      }

      function emptyNode(text) {
        var node = document.createElement("div");
        node.className = "empty";
        node.textContent = text;
        return node;
      }

      function formatTime(totalSeconds) {
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function mergeState(base, saved) {
        if (!saved || typeof saved !== "object") {
          return base;
        }
        Object.keys(saved).forEach(function (key) {
          if (saved[key] && typeof saved[key] === "object" && !Array.isArray(saved[key]) && base[key] && typeof base[key] === "object" && !Array.isArray(base[key])) {
            base[key] = mergeState(base[key], saved[key]);
          } else {
            base[key] = saved[key];
          }
        });
        return base;
      }

      function makeId() {
        return "id-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36);
      }
    })();
  </script>
</body>
</html>
